name: Fullstack Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Prepare image name
        id: prep
        run: |
          echo "image_uri=${{ secrets.ACR_LOGIN_SERVER }}/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy Frontend
        run: |
          mkdir -p src/main/resources/static
          rm -rf src/main/resources/static/*
          cp -R frontend/dist/. src/main/resources/static/

      - name: Build Backend
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.prep.outputs.image_uri }}:latest
            ${{ steps.prep.outputs.image_uri }}:${{ github.sha }}

      #########################################################
      ## Azure Login
      #########################################################

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Azure Login
        uses: azure/cli@v2
        with:
          inlineScript: |
            az account show
            az group show --name "${{ secrets.AZURE_RESOURCE_GROUP }}"
            az acr show --name capstoneegistry

      #########################################################
      ## DEBUG
      #########################################################

      - name: Debug Variables
        run: |
          echo "==============================="
          echo "IMAGE_URI=${{ steps.prep.outputs.image_uri }}"
          echo "IMAGE_TAG=${{ github.sha }}"
          echo "WEBAPP=${{ secrets.AZURE_WEBAPP_NAME }}"
          echo "RESOURCE_GROUP=${{ secrets.AZURE_RESOURCE_GROUP }}"
          echo "REGISTRY=${{ secrets.ACR_LOGIN_SERVER }}"
          echo "USERNAME=${{ secrets.ACR_USERNAME }}"
          echo "PASSWORD PRESENT=$([[ -n '${{ secrets.ACR_PASSWORD }}' ]] && echo YES || echo NO)"
          echo "==============================="

      #########################################################
      ## Configure Container
      #########################################################

      - name: Configure Web App Container
        uses: azure/cli@v2
        env:
          IMAGE_URI: ${{ steps.prep.outputs.image_uri }}
          IMAGE_TAG: ${{ github.sha }}
          WEBAPP: ${{ secrets.AZURE_WEBAPP_NAME }}
          RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
          REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
          USERNAME: ${{ secrets.ACR_USERNAME }}
          PASSWORD: ${{ secrets.ACR_PASSWORD }}
        with:
          inlineScript: |
            set -eux

            echo "Current Azure Account"
            az account show

            echo "WebApp Details"
            az webapp show \
              --name "$WEBAPP" \
              --resource-group "$RG"

            echo "Container Configuration"

            az webapp config container set \
              --name "$WEBAPP" \
              --resource-group "$RG" \
              --container-image-name "$IMAGE_URI:$IMAGE_TAG" \
              --container-registry-url "https://$REGISTRY" \
              --container-registry-user "$USERNAME" \
              --container-registry-password "$PASSWORD" \
              --debug

      #########################################################
      ## App Settings
      #########################################################
#dsnf
      - name: Configure App Settings
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --settings \
              WEBSITES_PORT=8080 \
              APP_PORT="${{ secrets.APP_PORT }}" \
              DB_URL="${{ secrets.DB_URL }}" \
              DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              JWT_SECRET="${{ secrets.JWT_SECRET }}"