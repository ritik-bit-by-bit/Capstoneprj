name: Fullstack Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Prepare image name
        id: prep
        run: |
          REGISTRY="${{ secrets.ACR_LOGIN_SERVER }}"
          REGISTRY="$(printf '%s' "$REGISTRY" | tr -d '\r' | xargs)"
          REGISTRY="${REGISTRY#https://}"
          REGISTRY="${REGISTRY#http://}"
          REGISTRY="${REGISTRY%/}"

          if [ -z "$REGISTRY" ]; then
            echo "ACR_LOGIN_SERVER is missing or invalid"
            exit 1
          fi

          echo "image_uri=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy Frontend
        run: |
          mkdir -p src/main/resources/static
          rm -rf src/main/resources/static/*
          cp -R frontend/dist/. src/main/resources/static/

      - name: Build Backend
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.prep.outputs.image_uri }}:latest
            ${{ steps.prep.outputs.image_uri }}:${{ github.sha }}

      #########################################################
      ## Azure Login
      #########################################################

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate deployment values
        env:
          WEBAPP: ${{ secrets.AZURE_WEBAPP_NAME }}
          RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
          REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
          USERNAME: ${{ secrets.ACR_USERNAME }}
          PASSWORD: ${{ secrets.ACR_PASSWORD }}
          DB_URL: ${{ secrets.DB_URL }}
        run: |
          WEBAPP="$(printf '%s' "$WEBAPP" | tr -d '\r' | xargs)"
          RG="$(printf '%s' "$RG" | tr -d '\r' | xargs)"
          REGISTRY="$(printf '%s' "$REGISTRY" | tr -d '\r' | xargs)"
          REGISTRY="${REGISTRY#https://}"
          REGISTRY="${REGISTRY#http://}"
          REGISTRY="${REGISTRY%/}"

          if [ -z "$WEBAPP" ]; then
            echo "AZURE_WEBAPP_NAME is missing or blank"
            exit 1
          fi

          if [ -z "$RG" ]; then
            echo "AZURE_RESOURCE_GROUP is missing or blank"
            exit 1
          fi

          if [ -z "$USERNAME" ] || [ -z "$PASSWORD" ]; then
            echo "ACR_USERNAME or ACR_PASSWORD is missing or blank"
            exit 1
          fi

          if [ -z "$DB_URL" ]; then
            echo "DB_URL is missing or blank"
            exit 1
          fi

          if ! printf '%s' "$DB_URL" | grep -Eq '^jdbc:postgresql://'; then
            echo "DB_URL must start with jdbc:postgresql://"
            echo "Example: jdbc:postgresql://your-server.postgres.database.azure.com:5432/yourdb?sslmode=require"
            exit 1
          fi

          if ! printf '%s' "$WEBAPP" | grep -Eq '^[a-zA-Z0-9-]+$'; then
            echo "AZURE_WEBAPP_NAME contains invalid characters or extra spaces: '$WEBAPP'"
            exit 1
          fi

          echo "WEBAPP=$WEBAPP" >> "$GITHUB_ENV"
          echo "RG=$RG" >> "$GITHUB_ENV"
          echo "REGISTRY=$REGISTRY" >> "$GITHUB_ENV"

      - name: Verify Azure Login
        uses: azure/cli@v2
        with:
          inlineScript: |
            echo "Azure Account:"
            az account show

            echo "Resource Group:"
            az group show \
              --name "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --query "{name:name,location:location}" \
              -o table

            echo "Container Registry:"
            az acr show \
              --name capstoneegistry \
              --query "{name:name,loginServer:loginServer}" \
              -o table
      #########################################################
      ## DEBUG
      #########################################################

      - name: Debug Variables
        run: |
          echo "==============================="
          echo "IMAGE_URI=${{ steps.prep.outputs.image_uri }}"
          echo "IMAGE_TAG=${{ github.sha }}"
          echo "WEBAPP=${{ secrets.AZURE_WEBAPP_NAME }}"
          echo "RESOURCE_GROUP=${{ secrets.AZURE_RESOURCE_GROUP }}"
          echo "REGISTRY=${{ secrets.ACR_LOGIN_SERVER }}"
          echo "USERNAME=${{ secrets.ACR_USERNAME }}"
          echo "PASSWORD PRESENT=$([[ -n '${{ secrets.ACR_PASSWORD }}' ]] && echo YES || echo NO)"
          echo "==============================="

      #########################################################
      ## Configure Container
      #########################################################

      - name: Configure Web App Container
        uses: azure/cli@v2
        env:
          IMAGE_URI: ${{ steps.prep.outputs.image_uri }}
          IMAGE_TAG: ${{ github.sha }}
          WEBAPP: ${{ env.WEBAPP }}
          RG: ${{ env.RG }}
          REGISTRY: ${{ env.REGISTRY }}
          USERNAME: ${{ secrets.ACR_USERNAME }}
          PASSWORD: ${{ secrets.ACR_PASSWORD }}
        with:
          inlineScript: |
            set -eux

            WEBAPP="$(printf '%s' "$WEBAPP" | tr -d '\r' | xargs)"
            RG="$(printf '%s' "$RG" | tr -d '\r' | xargs)"
            REGISTRY="$(printf '%s' "$REGISTRY" | tr -d '\r' | xargs)"
            REGISTRY="${REGISTRY#https://}"
            REGISTRY="${REGISTRY#http://}"
            REGISTRY="${REGISTRY%/}"

            az webapp config container set \
              --name "$WEBAPP" \
              --resource-group "$RG" \
              --container-image-name "$IMAGE_URI:$IMAGE_TAG" \
              --container-registry-url "https://$REGISTRY" \
              --container-registry-user "$USERNAME" \
              --container-registry-password "$PASSWORD" \
              --debug

      #########################################################
      ## App Settings
      #########################################################
#dsnf
      - name: Configure App Settings
        uses: azure/cli@v2
        env:
          WEBAPP: ${{ env.WEBAPP }}
          RG: ${{ env.RG }}
          APP_PORT: ${{ secrets.APP_PORT }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          inlineScript: |
            WEBAPP="$(printf '%s' "$WEBAPP" | tr -d '\r' | xargs)"
            RG="$(printf '%s' "$RG" | tr -d '\r' | xargs)"

            az webapp config appsettings set \
              --name "$WEBAPP" \
              --resource-group "$RG" \
              --settings \
              WEBSITES_PORT=8080 \
              APP_PORT="$APP_PORT" \
              DB_URL="$DB_URL" \
              DB_USERNAME="$DB_USERNAME" \
              DB_PASSWORD="$DB_PASSWORD" \
              JWT_SECRET="$JWT_SECRET"
