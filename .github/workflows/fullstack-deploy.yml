name: Fullstack Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Prepare image name
        id: prep
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          echo "image_uri=${ACR_LOGIN_SERVER}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend build to Spring Boot static folder
        run: |
          rm -rf src/main/resources/static/*
          cp -R frontend/dist/* src/main/resources/static/

      - name: Build Backend
        run: ./mvnw clean package -DskipTests

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.prep.outputs.image_uri }}:latest
            ${{ steps.prep.outputs.image_uri }}:${{ github.sha }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure Web App Container
        uses: azure/cli@v2
        env:
          IMAGE_URI: ${{ steps.prep.outputs.image_uri }}
          IMAGE_TAG: ${{ github.sha }}
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}

          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

        with:
          inlineScript: |
            az webapp config container set \
              --name "$AZURE_WEBAPP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --container-image-name "$IMAGE_URI:$IMAGE_TAG" \
              --container-registry-url "https://${ACR_LOGIN_SERVER}" \
              --container-registry-user "$ACR_USERNAME" \
              --container-registry-password "$ACR_PASSWORD"

      - name: Configure Application Settings
        uses: azure/cli@v2
        env:
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}

          APP_PORT: ${{ secrets.APP_PORT }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_DRIVER: ${{ secrets.DB_DRIVER }}

          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION_MINUTES: ${{ secrets.JWT_EXPIRATION_MINUTES }}

          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}

          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}

          PASSWORD_RESET_OTP_EXPIRY_MINUTES: ${{ secrets.PASSWORD_RESET_OTP_EXPIRY_MINUTES }}

        with:
          inlineScript: |
            az webapp config appsettings set \
              --name "$AZURE_WEBAPP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --settings \
              WEBSITES_PORT=8080 \
              APP_PORT="$APP_PORT" \
              DB_URL="$DB_URL" \
              DB_USERNAME="$DB_USERNAME" \
              DB_PASSWORD="$DB_PASSWORD" \
              DB_DRIVER="$DB_DRIVER" \
              JWT_SECRET="$JWT_SECRET" \
              JWT_EXPIRATION_MINUTES="$JWT_EXPIRATION_MINUTES" \
              CORS_ALLOWED_ORIGINS="$CORS_ALLOWED_ORIGINS" \
              MAIL_HOST="$MAIL_HOST" \
              MAIL_PORT="$MAIL_PORT" \
              MAIL_USERNAME="$MAIL_USERNAME" \
              MAIL_PASSWORD="$MAIL_PASSWORD" \
              PASSWORD_RESET_OTP_EXPIRY_MINUTES="$PASSWORD_RESET_OTP_EXPIRY_MINUTES"